openapi: 3.0.3
info:
  title: Linksee Teaching Collaboration API
  version: 1.0.0
  description: >
    Linksee 教学项目协作与过程评价平台的 P0 API schema。
    本文件与 docs/api/contracts/communication-contract-v1.md 保持一致，
    优先覆盖课程项目、阶段要求、小组讨论、阶段提交、教师反馈和课程看板。
servers:
  - url: /api/v1
    description: Linksee API v1

tags:
  - name: Auth
    description: 登录、改密、Token 管理
  - name: Users
    description: 用户信息与 profile
  - name: Courses
    description: 课程基础信息与访问范围
  - name: Assignments
    description: 课程项目
  - name: Stages
    description: 阶段要求
  - name: Groups
    description: 小组协作
  - name: Submissions
    description: 阶段成果提交
  - name: Reviews
    description: 教师或助教反馈
  - name: Dashboard
    description: 教师课程看板

paths:
  /courses:
    get:
      tags:
        - Courses
      summary: 获取当前用户可访问的课程列表
      operationId: listCourses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 课程列表获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
              example:
                ok: true
                data:
                  - id: "1"
                    courseNo: SE2026-01
                    name: 软件工程
                    academicYear: 2026
                    semester: 2
                    status: active
                    description: 软件工程课程项目实践
                    createdAt: "2026-05-08T10:00:00+08:00"
        "401":
          $ref: "#/components/responses/Unauthenticated"
    post:
      tags:
        - Courses
      summary: 创建课程
      operationId: createCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseNo, name, academicYear, semester]
              properties:
                courseNo:
                  type: string
                name:
                  type: string
                academicYear:
                  type: integer
                semester:
                  type: integer
                description:
                  type: string
                  nullable: true
            example:
              courseNo: SE2026-01
              name: 软件工程
              academicYear: 2026
              semester: 2
              description: 软件工程课程项目实践
      responses:
        "201":
          description: 课程创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /courses/{courseId}:
    get:
      tags:
        - Courses
      summary: 获取课程详情
      operationId: getCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: 课程详情获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/CourseDetail"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Courses
      summary: 更新课程
      operationId: updateCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                status:
                  $ref: "#/components/schemas/CourseStatus"
            example:
              name: 软件工程（实验班）
              description: 更新后的课程说明
              status: active
      responses:
        "200":
          description: 课程更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      courseNo:
                        type: string
                      name:
                        type: string
                      status:
                        $ref: "#/components/schemas/CourseStatus"
                      updatedAt:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments:
    get:
      tags:
        - Assignments
      summary: 列出课程下 Assignment
      operationId: listAssignments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssignmentStatus"
      responses:
        "200":
          description: Assignment 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Assignment"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Assignments
      summary: 创建 Assignment
      operationId: createAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
            example:
              title: 软件工程课程项目
              description: 完成一个教学协作平台原型
              status: draft
      responses:
        "201":
          description: Assignment 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Assignment"
              example:
                ok: true
                data:
                  id: "1001"
                  courseId: "2001"
                  title: 软件工程课程项目
                  description: 完成一个教学协作平台原型
                  descriptionFiles: []
                  status: draft
                  createdBy: "2024000001"
                  createdAt: "2026-05-09T10:00:00.000Z"
                  updatedAt: "2026-05-09T10:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /assignments/{assignmentId}:
    get:
      tags:
        - Assignments
      summary: 获取 Assignment 详情
      operationId: getAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: Assignment 详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Assignment"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Assignments
      summary: 更新 Assignment
      operationId: updateAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssignmentRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Assignment"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Assignments
      summary: 删除 Assignment（无下游数据时）
      operationId: deleteAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: 删除成功
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /assignments/{assignmentId}/materials:
    post:
      tags:
        - Assignments
      summary: 上传 Assignment 说明附件
      operationId: uploadAssignmentMaterials
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialUploadResult"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Assignments
      summary: 删除 Assignment 说明附件
      operationId: deleteAssignmentMaterial
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
        - name: objectKey
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                objectKey:
                  type: string
      responses:
        "200":
          description: 删除成功
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /assignments/{assignmentId}/stages:
    get:
      tags:
        - Stages
      summary: 列出 Assignment 下 Stage
      operationId: listStages
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: Stage 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Stage"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Stages
      summary: 创建 Stage
      operationId: createStage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStageRequest"
            example:
              title: 需求分析提交
              description: 提交需求说明书、用例图和原型链接
              startAt: "2026-05-10T00:00:00+08:00"
              dueAt: "2026-05-15T23:59:59+08:00"
              weight: 20
              submissionDesc: 提交 PDF 与仓库链接
              acceptCriteria: 需求完整、结构清晰、可追踪
              status: planned
      responses:
        "201":
          description: Stage 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Stage"
              example:
                ok: true
                data:
                  id: "3001"
                  assignmentId: "1001"
                  stageNo: 1
                  title: 需求分析提交
                  description: 提交需求说明书、用例图和原型链接
                  startAt: "2026-05-10T00:00:00.000Z"
                  dueAt: "2026-05-15T23:59:59.000Z"
                  weight: 20
                  submissionDesc: 提交 PDF 与仓库链接
                  requirementFiles: []
                  acceptCriteria: 需求完整、结构清晰、可追踪
                  status: planned
                  createdBy: "2024000001"
                  createdAt: "2026-05-09T10:00:00.000Z"
                  updatedAt: "2026-05-09T10:00:00.000Z"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /stages/{stageId}:
    get:
      tags:
        - Stages
      summary: 获取 Stage 详情
      operationId: getStage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StageId"
      responses:
        "200":
          description: Stage 详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Stage"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Stages
      summary: 更新 Stage
      operationId: updateStage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStageRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Stage"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Stages
      summary: 归档 Stage（status=archived）
      operationId: archiveStage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StageId"
      responses:
        "200":
          description: 归档成功
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /stages/{stageId}/materials:
    post:
      tags:
        - Stages
      summary: 上传 Stage 要求附件
      operationId: uploadStageMaterials
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StageId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialUploadResult"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Stages
      summary: 删除 Stage 要求附件
      operationId: deleteStageMaterial
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StageId"
        - name: objectKey
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                objectKey:
                  type: string
      responses:
        "200":
          description: 删除成功
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /groups/{groupId}/messages:
    post:
      tags:
        - Groups
      summary: 创建小组讨论消息
      operationId: createGroupMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupMessageRequest"
            example:
              content: 我已经上传了需求分析初稿，请大家今晚前补充用例。
      responses:
        "200":
          description: 小组讨论消息创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMessage"
              example:
                id: message_001
                groupId: group_001
                content: 我已经上传了需求分析初稿，请大家今晚前补充用例。
                creatorId: student_001
                createdAt: "2026-04-30T11:20:00+08:00"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /stages/{stageId}/groups/{groupId}/submissions:
    post:
      tags:
        - Submissions
      summary: 创建阶段成果提交
      operationId: createSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StageId"
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
            example:
              title: 需求分析阶段提交
              description: 提交需求说明书、用例图和原型链接
              fileIds:
                - file_001
              links:
                - https://example.com/prototype
              repositoryUrl: https://github.com/example/linksee-demo
              contributionNote: 张三负责需求文档，李四负责原型，王五负责接口草案。
      responses:
        "200":
          description: 阶段成果提交创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
              example:
                id: submission_001
                stageId: stage_001
                groupId: group_001
                status: submitted
                submittedBy: student_001
                submittedAt: "2026-05-15T21:30:00+08:00"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /submissions/{submissionId}/reviews:
    post:
      tags:
        - Reviews
      summary: 创建教师或助教反馈
      operationId: createReview
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SubmissionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
            example:
              status: needs_changes
              comment: 需求说明较完整，但需要补充异常流程和验收标准。
              rubricScores:
                - item: 需求完整性
                  score: 42
                  maxScore: 50
                - item: 表达清晰度
                  score: 40
                  maxScore: 50
      responses:
        "200":
          description: Review 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
              example:
                id: review_001
                submissionId: submission_001
                status: needs_changes
                score: 82
                reviewerId: teacher_001
                createdAt: "2026-05-16T09:30:00+08:00"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /courses/{courseId}/dashboard:
    get:
      tags:
        - Dashboard
      summary: 获取教师课程看板
      operationId: getCourseDashboard
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: 课程看板获取成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDashboard"
              example:
                courseId: course_software_engineering
                groups:
                  - groupId: group_001
                    name: 第 1 小组
                    progress: 60
                    pendingReviewCount: 1
                    overdueCount: 0
                    inactive: false
                  - groupId: group_002
                    name: 第 2 小组
                    progress: 30
                    pendingReviewCount: 0
                    overdueCount: 1
                    inactive: true
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/change-password:
    post:
      tags:
        - Auth
      summary: 修改密码
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 72
                  description: 必须包含大写字母、小写字母、数字
            example:
              currentPassword: "OldPass1"
              newPassword: "NewPass1"
      responses:
        "200":
          description: 密码修改成功，同时签发新 token
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                      expiresIn:
                        type: string
              example:
                ok: true
                data:
                  accessToken: "eyJ..."
                  refreshToken: "abc123"
                  expiresIn: "30m"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"

