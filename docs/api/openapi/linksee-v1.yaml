components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
      description: 课程 ID。
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
      description: Assignment ID。
    StageId:
      name: stageId
      in: path
      required: true
      schema:
        type: string
      description: Stage ID。
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
      description: Group ID。
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
      description: Submission ID。
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: 写操作幂等键，建议使用 UUID。

  responses:
    Unauthenticated:
      description: 未认证或 token 无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHENTICATED
              message: Authentication token is missing or invalid.
              traceId: trace_20260430_001
    Forbidden:
      description: 当前用户无权访问该资源或执行该操作
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: Current user is not allowed to perform this operation.
              traceId: trace_20260430_002
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: Requested resource was not found.
              traceId: trace_20260430_003
    Conflict:
      description: 当前资源状态与请求操作冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: CONFLICT
              message: Resource state conflicts with this operation.
              traceId: trace_20260430_004
    ValidationFailed:
      description: 请求字段校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_FAILED
              message: Request payload validation failed.
              traceId: trace_20260430_005

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - traceId
          properties:
            code:
              type: string
              enum:
                - UNAUTHENTICATED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - VALIDATION_FAILED
                - INTERNAL_ERROR
            message:
              type: string
            traceId:
              type: string

    CreateAssignmentRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "#/components/schemas/AssignmentStatus"

    UpdateAssignmentRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "#/components/schemas/AssignmentStatus"

    AssignmentStatus:
      type: string
      enum:
        - draft
        - active
        - archived

    Assignment:
      type: object
      required:
        - id
        - courseId
        - title
        - status
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        courseId:
          type: string
        title:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          nullable: true
          maxLength: 2000
        descriptionFiles:
          type: array
          items:
            $ref: "#/components/schemas/StoredFile"
        status:
          $ref: "#/components/schemas/AssignmentStatus"
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CourseStatus:
      type: string
      enum:
        - draft
        - active
        - archived

    Course:
      type: object
      required:
        - id
        - courseNo
        - name
        - academicYear
        - semester
        - status
        - createdAt
      properties:
        id:
          type: string
        courseNo:
          type: string
        name:
          type: string
        academicYear:
          type: integer
        semester:
          type: integer
        status:
          $ref: "#/components/schemas/CourseStatus"
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CourseDetail:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          required:
            - updatedAt
            - _count
          properties:
            updatedAt:
              type: string
              format: date-time
            _count:
              type: object
              required:
                - members
                - teachers
              properties:
                members:
                  type: integer
                  minimum: 0
                teachers:
                  type: integer
                  minimum: 0

    CreateStageRequest:
      type: object
      required:
        - title
        - dueAt
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 60
        description:
          type: string
          nullable: true
          maxLength: 2000
        startAt:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
        weight:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        submissionDesc:
          type: string
          nullable: true
          maxLength: 2000
        acceptCriteria:
          type: string
          nullable: true
          maxLength: 2000
        status:
          $ref: "#/components/schemas/StageStatus"

    UpdateStageRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 60
        description:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        weight:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        submissionDesc:
          type: string
          nullable: true
        acceptCriteria:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/StageStatus"

    StageStatus:
      type: string
      enum:
        - planned
        - open
        - closed
        - archived

    Stage:
      type: object
      required:
        - id
        - assignmentId
        - stageNo
        - title
        - status
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        assignmentId:
          type: string
        stageNo:
          type: integer
          minimum: 1
        title:
          type: string
          minLength: 1
          maxLength: 60
        description:
          type: string
          nullable: true
          maxLength: 2000
        startAt:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        weight:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        submissionDesc:
          type: string
          nullable: true
        requirementFiles:
          type: array
          items:
            $ref: "#/components/schemas/StoredFile"
        acceptCriteria:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/StageStatus"
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StoredFile:
      type: object
      required:
        - name
        - objectKey
        - size
        - mimeType
        - uploadedAt
        - url
      properties:
        name:
          type: string
        objectKey:
          type: string
        size:
          type: integer
        mimeType:
          type: string
        uploadedAt:
          type: string
          format: date-time
        url:
          type: string

    MaterialUploadResult:
      type: object
      required:
        - ok
        - data
      properties:
        ok:
          type: boolean
        data:
          type: object
          required:
            - uploaded
            - total
          properties:
            uploaded:
              type: array
              items:
                $ref: "#/components/schemas/StoredFile"
            total:
              type: integer
              minimum: 0

    CreateGroupMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000

    GroupMessage:
      type: object
      required:
        - id
        - groupId
        - content
        - creatorId
        - createdAt
      properties:
        id:
          type: string
        groupId:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 2000
        creatorId:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateSubmissionRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 3000
        fileIds:
          type: array
          maxItems: 20
          items:
            type: string
        links:
          type: array
          maxItems: 10
          items:
            type: string
            format: uri
        repositoryUrl:
          type: string
          format: uri
        contributionNote:
          type: string
          maxLength: 3000

    SubmissionStatus:
      type: string
      enum:
        - not_submitted
        - submitted
        - needs_changes
        - resubmitted
        - approved

    Submission:
      type: object
      required:
        - id
        - stageId
        - groupId
        - status
        - submittedBy
        - submittedAt
      properties:
        id:
          type: string
        stageId:
          type: string
        groupId:
          type: string
        status:
          $ref: "#/components/schemas/SubmissionStatus"
        submittedBy:
          type: string
        submittedAt:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required:
        - status
        - comment
      properties:
        status:
          type: string
          enum:
            - needs_changes
            - approved
        comment:
          type: string
          minLength: 1
          maxLength: 3000
        rubricScores:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/RubricScore"

    RubricScore:
      type: object
      required:
        - item
        - score
        - maxScore
      properties:
        item:
          type: string
          minLength: 1
          maxLength: 80
        score:
          type: number
          minimum: 0
        maxScore:
          type: number
          exclusiveMinimum: true
          minimum: 0
          maximum: 100

    Review:
      type: object
      required:
        - id
        - submissionId
        - status
        - reviewerId
        - createdAt
      properties:
        id:
          type: string
        submissionId:
          type: string
        status:
          type: string
          enum:
            - needs_changes
            - approved
        score:
          type: number
          minimum: 0
          maximum: 100
        reviewerId:
          type: string
        createdAt:
          type: string
          format: date-time

    CourseDashboard:
      type: object
      required:
        - courseId
        - groups
      properties:
        courseId:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/DashboardGroup"

    DashboardGroup:
      type: object
      required:
        - groupId
        - name
        - progress
        - pendingReviewCount
        - overdueCount
        - inactive
      properties:
        groupId:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 60
        progress:
          type: integer
          minimum: 0
          maximum: 100
        pendingReviewCount:
          type: integer
          minimum: 0
        overdueCount:
          type: integer
          minimum: 0
        inactive:
          type: boolean
