<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Status</title>
    <style>
      body { font-family: "Segoe UI", sans-serif; margin: 32px; }
      .badge { display: inline-block; padding: 6px 10px; border-radius: 6px; color: #fff; }
      .offline { background: #b91c1c; }
      .online { background: #15803d; }
      button { padding: 10px 16px; margin-right: 12px; margin-top: 16px; }
      pre { background: #111827; color: #e5e7eb; padding: 12px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>在线状态窗口（Demo）</h1>
    <p>当前状态：<span id="statusBadge" class="badge offline">离线</span></p>
    <p>心跳状态：<span id="heartbeatBadge" class="badge offline">未启动</span></p>
    <p>心跳延迟：<span id="heartbeatRtt">-</span> ms</p>
    <p>最近客户端心跳发送：<span id="lastPingAt">-</span></p>
    <p>最近服务端心跳响应：<span id="lastPongAt">-</span></p>
    <p>连接说明：登录前离线；登录后立即在线。</p>
    <button id="openLogin">打开登录窗口</button>
    <button id="clearToken">清除 token 并离线</button>
    <pre id="log">[log] waiting...</pre>

    <script>
      const runtimeOrigin =
        window.location.origin && window.location.origin !== "null"
          ? window.location.origin
          : "";
      const storedOrigin = localStorage.getItem("demo_origin") || "";
      const DEMO_ORIGIN = runtimeOrigin || storedOrigin || "https://localhost:3443";
      const statusBadge = document.getElementById("statusBadge");
      const heartbeatBadge = document.getElementById("heartbeatBadge");
      const heartbeatRtt = document.getElementById("heartbeatRtt");
      const lastPingAt = document.getElementById("lastPingAt");
      const lastPongAt = document.getElementById("lastPongAt");
      const log = document.getElementById("log");
      const openLogin = document.getElementById("openLogin");
      const clearToken = document.getElementById("clearToken");
      const authChannel = window.BroadcastChannel ? new BroadcastChannel("demo_auth") : null;
      let socket;
      let lastToken = localStorage.getItem("demo_auth_token");
      let heartbeatTimer;
      let heartbeatAckTimer;
      let heartbeatSeq = 0;
      let heartbeatIntervalMs = 5000;
      let heartbeatTimeoutMs = 15000;

      if (runtimeOrigin && storedOrigin !== runtimeOrigin) {
        localStorage.setItem("demo_origin", runtimeOrigin);
      }

      if (window.location.protocol === "file:") {
        setStatus("离线", false);
        appendLog({ reason: "opened_from_file_protocol", next: `${DEMO_ORIGIN}/status.html` });
      }

      function setStatus(text, isOnline) {
        statusBadge.textContent = text;
        statusBadge.className = "badge " + (isOnline ? "online" : "offline");
      }

      function appendLog(data) {
        log.textContent = "[log] " + JSON.stringify(data, null, 2);
      }

      function setHeartbeat(text, healthy, rttValue) {
        heartbeatBadge.textContent = text;
        heartbeatBadge.className = "badge " + (healthy ? "online" : "offline");
        heartbeatRtt.textContent = Number.isFinite(rttValue) ? String(rttValue) : "-";
      }

      function setHeartbeatTime(idNode, tsValue) {
        if (!idNode) {
          return;
        }
        idNode.textContent = tsValue || "-";
      }

      function stopHeartbeatLoop() {
        if (heartbeatTimer) {
          clearInterval(heartbeatTimer);
          heartbeatTimer = undefined;
        }
        if (heartbeatAckTimer) {
          clearTimeout(heartbeatAckTimer);
          heartbeatAckTimer = undefined;
        }
      }

      function startHeartbeatLoop() {
        stopHeartbeatLoop();
        setHeartbeat("运行中", true);

        heartbeatTimer = setInterval(() => {
          if (!socket || !socket.connected) {
            return;
          }

          heartbeatSeq += 1;
          const sentAt = Date.now();
          setHeartbeatTime(lastPingAt, new Date(sentAt).toISOString());
          socket.emit("heartbeat:ping", {
            seq: heartbeatSeq,
            sentAt,
            clientTs: new Date(sentAt).toISOString(),
          });

          if (heartbeatAckTimer) {
            clearTimeout(heartbeatAckTimer);
          }
          heartbeatAckTimer = setTimeout(() => {
            setHeartbeat("超时", false);
            appendLog({ reason: "heartbeat_timeout_on_client", seq: heartbeatSeq });
          }, heartbeatTimeoutMs);
        }, heartbeatIntervalMs);
      }

      function connectByToken() {
        const token = localStorage.getItem("demo_auth_token");
        lastToken = token;
        if (!token) {
          if (socket) {
            socket.disconnect();
            socket = undefined;
          }
          stopHeartbeatLoop();
          setHeartbeat("未启动", false);
          setHeartbeatTime(lastPingAt, null);
          setHeartbeatTime(lastPongAt, null);
          setStatus("离线", false);
          appendLog({ reason: "no token" });
          return;
        }

        if (socket && socket.__authToken === token) {
          socket.emit("presence:check");
          return;
        }

        if (socket) {
          socket.disconnect();
        }
        stopHeartbeatLoop();
        setHeartbeat("连接中", false);
        setHeartbeatTime(lastPingAt, null);
        setHeartbeatTime(lastPongAt, null);

        socket = io(DEMO_ORIGIN, { auth: { token } });
        socket.__authToken = token;

        socket.on("connect", () => {
          socket.emit("presence:check");
          startHeartbeatLoop();
        });

        socket.on("presence", (payload) => {
          const isOnline = payload.status === "online";
          setStatus(isOnline ? "在线" : "离线", isOnline);
          appendLog(payload);
        });

        socket.on("disconnect", () => {
          stopHeartbeatLoop();
          setHeartbeat("已停止", false);
          setStatus("离线", false);
          appendLog({ reason: "socket disconnected" });
        });

        socket.on("heartbeat:config", (payload) => {
          heartbeatIntervalMs = Number(payload?.intervalMs) || 5000;
          heartbeatTimeoutMs = Number(payload?.timeoutMs) || 15000;
          appendLog({ reason: "heartbeat_config", intervalMs: heartbeatIntervalMs, timeoutMs: heartbeatTimeoutMs });
          if (socket.connected) {
            startHeartbeatLoop();
          }
        });

        socket.on("heartbeat:pong", (payload) => {
          if (heartbeatAckTimer) {
            clearTimeout(heartbeatAckTimer);
            heartbeatAckTimer = undefined;
          }
          setHeartbeat("正常", true, payload?.rttMs);
          setHeartbeatTime(lastPongAt, payload?.serverSendTs || payload?.serverReceiveTs || payload?.serverTs || null);
          appendLog(payload);
        });

        socket.on("connect_error", (err) => {
          stopHeartbeatLoop();
          setHeartbeat("异常", false);
          setStatus("离线", false);
          appendLog({ reason: "connect_error", message: err.message });
        });
      }

      function loadSocketClient() {
        return new Promise((resolve, reject) => {
          if (window.io) {
            resolve();
            return;
          }

          const script = document.createElement("script");
          script.src = `${DEMO_ORIGIN}/socket.io/socket.io.js`;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error("failed to load socket.io client"));
          document.head.appendChild(script);
        });
      }

      openLogin.addEventListener("click", () => {
        window.open(`${DEMO_ORIGIN}/login.html`, "_blank");
      });

      clearToken.addEventListener("click", () => {
        localStorage.removeItem("demo_auth_token");
        connectByToken();
      });

      window.addEventListener("storage", (event) => {
        if (event.key === "demo_auth_token") {
          connectByToken();
        }
      });

      if (authChannel) {
        authChannel.onmessage = (event) => {
          if (event?.data?.type === "auth-changed") {
            connectByToken();
          }
        };
      }

      // 兜底：部分浏览器/场景下 storage 事件不稳定，定时检查 token 变化
      setInterval(() => {
        const tokenNow = localStorage.getItem("demo_auth_token");
        if (tokenNow !== lastToken) {
          connectByToken();
        }
      }, 1000);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          connectByToken();
        }
      });

      loadSocketClient()
        .then(() => connectByToken())
        .catch((err) => {
          setStatus("离线", false);
          appendLog({ reason: err.message, hint: `${DEMO_ORIGIN}/status.html` });
        });
    </script>
  </body>
</html>
