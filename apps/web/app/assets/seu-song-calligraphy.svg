<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 560">
  <defs>
    <filter id="brush-soften" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.1"/>
    </filter>
    <style>
      .ink {
        fill: #3f3527;
        font-family: "STXingkai", "KaiTi", "FangSong", serif;
        font-weight: 600;
        writing-mode: vertical-rl;
        text-orientation: upright;
        filter: url(#brush-soften);
      }
      .fine {
        fill: #6d5b3d;
        font-family: "KaiTi", "FangSong", serif;
        writing-mode: vertical-rl;
        text-orientation: upright;
        filter: url(#brush-soften);
      }
    </style>
  </defs>

  <g opacity="0.38">
    <text class="ink" x="336" y="28" font-size="34" letter-spacing="9">东揽钟山紫气，</text>
    <path d="M356 36C372 92 368 162 354 228" fill="none" stroke="#3f3527" stroke-width="1.8" stroke-linecap="round" opacity="0.22"/>

    <text class="fine" x="260" y="56" font-size="33" letter-spacing="9">北拥扬子银涛。</text>
    <path d="M278 62C262 122 264 190 278 254" fill="none" stroke="#6d5b3d" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>

    <text class="ink" x="184" y="36" font-size="34" letter-spacing="9">六朝松下听箫韶。</text>
    <path d="M204 42C188 108 188 184 202 252" fill="none" stroke="#3f3527" stroke-width="1.6" stroke-linecap="round" opacity="0.21"/>

    <text class="fine" x="108" y="72" font-size="33" letter-spacing="9">齐梁遗韵在，</text>
    <path d="M126 78C110 142 114 218 128 282" fill="none" stroke="#6d5b3d" stroke-width="1.4" stroke-linecap="round" opacity="0.19"/>

    <text class="ink" x="34" y="88" font-size="34" letter-spacing="9">大学令名标。</text>
    <path d="M52 96C36 154 36 216 52 270" fill="none" stroke="#3f3527" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  </g>
</svg>
