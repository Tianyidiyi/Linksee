<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linksee 工作台</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f3ee;
            --ink: #1f1f1f;
            --muted: #6c6c6c;
            --accent: #0f766e;
            --accent-soft: rgba(15, 118, 110, 0.12);
            --radius-md: 14px;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f8f4ee, #efe7dd);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 64px 7vw;
        }

        .panel {
            width: min(640px, 100%);
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(17, 24, 39, 0.16);
            display: grid;
            gap: 16px;
        }

        .meta {
            padding: 12px 14px;
            border-radius: var(--radius-md);
            background: var(--accent-soft);
            color: var(--muted);
            font-size: 13px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            font: inherit;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
        }

        .ghost {
            background: var(--accent-soft);
            color: var(--accent);
        }
    </style>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap");
    </style>
</head>

<body>
    <main class="panel">
        <h1>登录成功</h1>
        <p>欢迎进入 Linksee 工作台占位页。</p>
        <div class="meta" id="metaInfo">正在加载登录信息...</div>
        <div class="actions">
            <button id="logoutBtn">退出登录</button>
            <button id="toLogin" class="ghost">返回登录页</button>
        </div>
    </main>

    <script>
        const appOrigin = window.location.origin && window.location.origin !== "null"
            ? window.location.origin
            : "http://localhost:3001";
        const appBasePath = window.location.pathname.includes("/app/") ? "/app" : "";
        const metaInfo = document.getElementById("metaInfo");
        const logoutBtn = document.getElementById("logoutBtn");
        const toLogin = document.getElementById("toLogin");

        const userId = localStorage.getItem("auth_user_id");
        const token = localStorage.getItem("auth_access_token");

        if (userId && token) {
            metaInfo.textContent = `当前登录账号：${userId}`;
        } else {
            metaInfo.textContent = "未检测到登录信息，请返回登录页。";
        }

        logoutBtn.addEventListener("click", () => {
            localStorage.removeItem("auth_access_token");
            localStorage.removeItem("auth_refresh_token");
            localStorage.removeItem("auth_user_id");
            window.location.href = `${appOrigin}${appBasePath}/login.html`;
        });

        toLogin.addEventListener("click", () => {
            window.location.href = `${appOrigin}${appBasePath}/login.html`;
        });
    </script>
</body>

</html>
