<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linksee 登录</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6efe5;
            --bg-deep: #e7ddd0;
            --card: rgba(255, 255, 255, 0.78);
            --card-strong: rgba(255, 255, 255, 0.92);
            --ink: #1d2422;
            --muted: #5d6a66;
            --accent: #0f766e;
            --accent-strong: #0b4f49;
            --accent-bright: #2dd4bf;
            --accent-soft: rgba(15, 118, 110, 0.1);
            --accent-fog: rgba(45, 212, 191, 0.16);
            --border: rgba(29, 36, 34, 0.08);
            --shadow: 0 30px 80px rgba(28, 37, 44, 0.16);
            --shadow-soft: 0 16px 36px rgba(15, 23, 42, 0.1);
            --radius-lg: 24px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
            color: var(--ink);
            background: radial-gradient(1200px 600px at 10% -10%, #fff9f0 0%, transparent 60%),
                radial-gradient(900px 520px at 100% 8%, rgba(183, 243, 233, 0.75) 0%, transparent 58%),
                radial-gradient(900px 540px at 15% 100%, rgba(251, 191, 36, 0.18) 0%, transparent 55%),
                linear-gradient(180deg, var(--bg), var(--bg-deep));
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            pointer-events: none;
            z-index: 0;
            filter: blur(12px);
        }

        body::before {
            width: 38vw;
            height: 38vw;
            min-width: 360px;
            min-height: 360px;
            top: -12vw;
            right: -8vw;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.2) 0%, rgba(45, 212, 191, 0) 68%);
        }

        body::after {
            width: 32vw;
            height: 32vw;
            min-width: 300px;
            min-height: 300px;
            bottom: -10vw;
            left: -6vw;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.16) 0%, rgba(249, 115, 22, 0) 70%);
        }

        .page {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 96px 24px 48px;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            width: 100%;
            z-index: 1;
        }

        .topbar {
            position: absolute;
            top: 28px;
            left: 32px;
            display: flex;
            align-items: center;
            z-index: 2;
        }

        .auth-shell {
            width: min(100%, 820px);
            display: grid;
            position: relative;
            z-index: 1;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 10px 14px 10px 10px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(18px);
            border-radius: 999px;
            box-shadow: 0 16px 34px rgba(17, 24, 39, 0.08);
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: linear-gradient(140deg, var(--accent), var(--accent-bright));
            box-shadow: 0 10px 20px rgba(15, 118, 110, 0.35);
            position: relative;
        }

        .brand-mark::after {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            opacity: 0.9;
        }

        .orb {
            --base-x: 0px;
            --base-y: 0px;
            --push-x: 0px;
            --push-y: 0px;
            --bubble-scale-x: 1;
            --bubble-scale-y: 1;
            --bubble-fill: rgba(15, 118, 110, 0.22);
            --float-distance: 24px;
            --float-duration: 10s;
            --float-delay: 0s;
            position: absolute;
            border-radius: 999px;
            opacity: 0.7;
            pointer-events: none;
            transform: translate(var(--base-x), var(--base-y)) translate3d(var(--push-x), var(--push-y), 0) scale(var(--bubble-scale-x), var(--bubble-scale-y));
            transform-origin: center;
            will-change: transform;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            mix-blend-mode: screen;
        }

        .orb::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                radial-gradient(circle at 30% 26%, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.1) 11%, transparent 24%),
                radial-gradient(circle at 66% 72%, rgba(255, 255, 255, 0.1), transparent 30%),
                var(--bubble-fill);
            box-shadow:
                inset 12px 16px 34px rgba(255, 255, 255, 0.14),
                inset -18px -22px 44px rgba(15, 23, 42, 0.05),
                0 28px 90px rgba(15, 23, 42, 0.06);
            animation: bubble-float var(--float-duration) ease-in-out infinite var(--float-delay),
                bubble-breathe calc(var(--float-duration) * 0.72) ease-in-out infinite var(--float-delay);
            will-change: transform;
        }

        .orb--left {
            width: 760px;
            height: 760px;
            --bubble-fill: rgba(15, 118, 110, 0.24);
            --float-duration: 13s;
            --float-distance: 38px;
            top: -8%;
            left: -16%;
        }

        .orb--right {
            width: 680px;
            height: 680px;
            --bubble-fill: rgba(249, 115, 22, 0.16);
            --float-duration: 14s;
            --float-delay: -2.8s;
            --float-distance: 34px;
            top: 10%;
            right: -14%;
            opacity: 0.58;
        }

        .orb--top {
            width: 560px;
            height: 560px;
            --base-x: -50%;
            --bubble-fill: rgba(56, 189, 248, 0.18);
            --float-duration: 11s;
            --float-delay: -1.2s;
            --float-distance: 28px;
            top: -18%;
            left: 50%;
            opacity: 0.56;
        }

        .orb--bottom {
            width: 620px;
            height: 620px;
            --bubble-fill: rgba(94, 234, 212, 0.18);
            --float-duration: 15s;
            --float-delay: -3.4s;
            --float-distance: 32px;
            bottom: -22%;
            left: 8%;
            opacity: 0.62;
        }

        .orb--mid {
            width: 500px;
            height: 500px;
            --bubble-fill: rgba(16, 185, 129, 0.14);
            --float-duration: 12s;
            --float-delay: -1.9s;
            --float-distance: 24px;
            bottom: -12%;
            right: 6%;
            opacity: 0.46;
        }

        .orb--far-right {
            width: 520px;
            height: 520px;
            --bubble-fill: rgba(45, 212, 191, 0.16);
            --float-duration: 12.5s;
            --float-delay: -4.1s;
            --float-distance: 30px;
            bottom: 12%;
            right: -10%;
            opacity: 0.5;
        }

        .intro-panel {
            position: relative;
            width: 100%;
            height: 440px;
            padding: 28px 30px 32px;
            border-radius: 32px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.68));
            border: 1px solid rgba(255, 255, 255, 0.68);
            box-shadow:
                0 36px 90px rgba(15, 23, 42, 0.16),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(22px);
            overflow: hidden;
            animation: reveal 0.85s ease-out;
        }

        .intro-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(45, 212, 191, 0.08), transparent 38%),
                linear-gradient(315deg, rgba(59, 130, 246, 0.1), transparent 42%);
            pointer-events: none;
        }

        .intro-panel::after {
            content: "";
            position: absolute;
            inset: 76px 26px 82px;
            border-radius: 24px;
            background:
                linear-gradient(rgba(15, 118, 110, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 118, 110, 0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.28;
            pointer-events: none;
        }

        .intro-chrome {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 34px;
        }

        .intro-dots {
            display: inline-flex;
            gap: 8px;
        }

        .intro-dots span {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.14);
        }

        .intro-dots span:nth-child(1) {
            background: rgba(248, 113, 113, 0.85);
        }

        .intro-dots span:nth-child(2) {
            background: rgba(250, 204, 21, 0.88);
        }

        .intro-dots span:nth-child(3) {
            background: rgba(52, 211, 153, 0.9);
        }

        .intro-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: rgba(29, 36, 34, 0.55);
            text-transform: uppercase;
        }

        .intro-body {
            position: relative;
            z-index: 1;
            min-height: 252px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
        }

        .type-line {
            width: 12.6ch;
            min-height: 1.95em;
            font-size: clamp(44px, 7vw, 84px);
            line-height: 0.95;
            letter-spacing: -0.05em;
            color: #10201d;
            margin: 0;
            text-wrap: wrap;
        }

        .type-text {
            position: relative;
            display: inline;
        }

        .type-text::after {
            content: "";
            display: inline-block;
            width: 0.08em;
            height: 0.9em;
            margin-left: 0.08em;
            background: #2563eb;
            vertical-align: -0.08em;
            animation: cursor-blink 1s steps(1) infinite;
        }

        .intro-subtext {
            max-width: 34ch;
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.75;
        }

        .intro-actions {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
        }

        .start-btn {
            padding: 14px 22px;
            border-radius: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.28);
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .start-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 22px 46px rgba(37, 99, 235, 0.32);
        }

        .login-modal {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s ease;
            z-index: 20;
        }

        .login-modal.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.22);
            backdrop-filter: blur(16px);
        }

        .login-dialog {
            position: relative;
            z-index: 1;
            width: min(100%, 420px);
        }

        .card {
            position: relative;
            background:
                linear-gradient(180deg, var(--card-strong), var(--card));
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 31, 31, 0.06);
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: reveal 0.9s ease-out;
            backdrop-filter: blur(20px);
            overflow: hidden;
            width: 100%;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 120px;
            background: linear-gradient(180deg, rgba(45, 212, 191, 0.12), transparent);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .card h2 {
            margin: 0;
            font-size: 22px;
            letter-spacing: -0.02em;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .dialog-close {
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.08);
            color: var(--accent-strong);
            font-size: 18px;
            line-height: 1;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form {
            display: grid;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }

        input {
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid rgba(31, 31, 31, 0.12);
            font: inherit;
            background: rgba(255, 255, 255, 0.82);
            transition: border 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: rgba(15, 118, 110, 0.4);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
            background: rgba(255, 255, 255, 0.98);
        }

        .notice {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            display: none;
        }

        .notice.is-visible {
            display: block;
        }

        .notice--error {
            background: rgba(220, 38, 38, 0.08);
            color: #991b1b;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .notice--success {
            background: rgba(5, 150, 105, 0.1);
            color: #065f46;
            border: 1px solid rgba(5, 150, 105, 0.2);
        }

        button {
            border: none;
            font: inherit;
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        button:focus-visible {
            outline: 3px solid rgba(15, 118, 110, 0.25);
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            box-shadow: 0 16px 34px rgba(15, 118, 110, 0.24);
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(15, 118, 110, 0.28);
        }

        .btn-ghost {
            background: rgba(15, 118, 110, 0.08);
            color: var(--accent-strong);
            font-weight: 600;
        }

        .card-note {
            font-size: 12px;
            color: var(--muted);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .clear-inline {
            align-self: center;
            padding: 0;
            background: none;
            color: var(--accent-strong);
            font-size: 13px;
            font-weight: 600;
        }

        @keyframes bubble-float {

            0%,
            100% {
                transform: translate3d(0, 0, 0);
            }

            50% {
                transform: translate3d(0, var(--float-distance), 0);
            }
        }

        @keyframes bubble-breathe {

            0%,
            100% {
                border-radius: 47% 53% 50% 50% / 49% 48% 52% 51%;
            }

            35% {
                border-radius: 52% 48% 45% 55% / 46% 53% 47% 54%;
            }

            70% {
                border-radius: 45% 55% 54% 46% / 54% 45% 55% 46%;
            }
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cursor-blink {
            0%,
            49% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0;
            }
        }

        @media (max-width: 720px) {
            .page {
                padding: 88px 16px 32px;
            }

            .topbar {
                top: 20px;
                left: 16px;
            }

            .intro-panel {
                height: 380px;
                padding: 22px 20px 24px;
            }

            .intro-panel::after {
                inset: 68px 18px 78px;
            }

            .type-line {
                font-size: clamp(34px, 12vw, 56px);
                width: 12.5ch;
                min-height: 1.95em;
            }

            .intro-subtext {
                max-width: none;
            }

            .intro-actions {
                justify-content: stretch;
            }

            .start-btn {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .orb,
            .orb::before,
            .intro-panel,
            .type-text::after,
            .card {
                animation: none;
                transition: none;
            }
        }
    </style>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap");
    </style>
</head>

<body>
    <main class="page">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true"></span>
                Linksee
            </div>
        </header>
        <div class="orb orb--left"></div>
        <div class="orb orb--right"></div>
        <div class="orb orb--top"></div>
        <div class="orb orb--bottom"></div>
        <div class="orb orb--mid"></div>
        <div class="orb orb--far-right"></div>
        <div class="auth-shell">
            <section class="intro-panel" aria-labelledby="typingHeadline">
                <div class="intro-chrome">
                    <div class="intro-dots" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="intro-label">Linksee</span>
                </div>
                <div class="intro-body">
                    <h1 class="type-line" id="typingHeadline">
                        <span class="type-text" id="typingText" aria-live="polite"></span>
                    </h1>
                    <p class="intro-subtext">让分组协作、课堂配合和提交流程都更直接。</p>
                </div>
                <div class="intro-actions">
                    <button class="start-btn" id="startBtn" type="button">GET STARTED</button>
                </div>
            </section>
        </div>

        <div class="login-modal" id="loginModal" aria-hidden="true">
            <div class="modal-backdrop" id="modalBackdrop"></div>
            <div class="login-dialog" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
            <section class="card">
                <div class="card-header">
                    <h2 id="loginTitle">账号登录</h2>
                    <button class="dialog-close" id="closeModalBtn" type="button" aria-label="关闭登录窗口">×</button>
                </div>
                <p>请输入 10 位一卡通号与密码。</p>
                <form id="loginForm" class="form">
                    <div class="field">
                        <label for="userId">一卡通号</label>
                        <input id="userId" name="userId" inputmode="numeric" placeholder="请输入 10 位一卡通号"
                            autocomplete="username" />
                    </div>
                    <div class="field">
                        <label for="password">密码</label>
                        <input id="password" name="password" type="password" placeholder="请输入密码"
                            autocomplete="current-password" />
                    </div>
                    <div class="notice notice--error" id="errorBox"></div>
                    <div class="notice notice--success" id="successBox"></div>
                    <div class="actions">
                        <button class="btn-primary" id="loginBtn" type="submit">登录</button>
                    </div>
                </form>
                <button class="clear-inline" id="clearBtn" type="button">清除本地登录</button>
                <p class="card-note">清除本地登录仅会移除当前浏览器保存的登录状态。</p>
            </section>
        </div>
        </div>
    </main>
    <script>
        const runtimeOrigin =
            window.location.origin && window.location.origin !== "null"
                ? window.location.origin
                : "";
        const storedAuthOrigin = localStorage.getItem("auth_origin") || "";
        const appOrigin = runtimeOrigin || "http://localhost:3001";
        const authOrigin = storedAuthOrigin || "http://localhost:3001";
        const appBasePath = window.location.pathname.includes("/app/") ? "/app" : "";
        const roleByUserId = {
            "2022000001": "academic",
            "2023000001": "teacher",
            "2023019001": "assistant",
            "2023010001": "student",
        };

        const loginForm = document.getElementById("loginForm");
        const userIdInput = document.getElementById("userId");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const clearBtn = document.getElementById("clearBtn");
        const errorBox = document.getElementById("errorBox");
        const successBox = document.getElementById("successBox");
        const startBtn = document.getElementById("startBtn");
        const loginModal = document.getElementById("loginModal");
        const modalBackdrop = document.getElementById("modalBackdrop");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const typingText = document.getElementById("typingText");
        const orbs = Array.from(document.querySelectorAll(".orb"));
        const typingMessage = "MAKE IT EASIER TO WORK IN GROUPS";
        const bubbleMotion = orbs.map((orb) => ({
            orb,
            x: 0,
            y: 0,
            targetX: 0,
            targetY: 0,
            scaleX: 1,
            scaleY: 1,
            targetScaleX: 1,
            targetScaleY: 1,
            driftX: 18 + Math.random() * 22,
            driftY: 14 + Math.random() * 20,
            speed: 0.00055 + Math.random() * 0.0003,
            phase: Math.random() * Math.PI * 2,
        }));
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

        function openLoginModal() {
            loginModal.classList.add("is-open");
            loginModal.setAttribute("aria-hidden", "false");
            window.setTimeout(() => {
                userIdInput.focus();
            }, 120);
        }

        function closeLoginModal() {
            loginModal.classList.remove("is-open");
            loginModal.setAttribute("aria-hidden", "true");
            startBtn.focus();
        }

        function runTypewriter(index = 0) {
            if (prefersReducedMotion.matches) {
                typingText.textContent = typingMessage;
                return;
            }
            typingText.textContent = typingMessage.slice(0, index);
            if (index >= typingMessage.length) {
                return;
            }
            const currentChar = typingMessage[index];
            const delay = currentChar === " " ? 55 : 85;
            window.setTimeout(() => runTypewriter(index + 1), delay);
        }

        function setNotice(target, text) {
            if (!target) {
                return;
            }
            target.textContent = text || "";
            target.classList.toggle("is-visible", Boolean(text));
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const userId = userIdInput.value.trim();
            const password = passwordInput.value.trim();

            setNotice(errorBox, "");
            setNotice(successBox, "");

            if (!/^\d{10}$/.test(userId)) {
                setNotice(errorBox, "账号必须是 10 位数字的一卡通号");
                return;
            }

            if (!password) {
                setNotice(errorBox, "请输入密码");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "登录中...";

            try {
                const response = await fetch(`${authOrigin}/api/v1/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ userId, password }),
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok || !payload?.ok) {
                    setNotice(errorBox, payload?.message || "登录失败，请检查账号或密码");
                    return;
                }

                const data = payload.data || {};
                localStorage.setItem("auth_access_token", data.accessToken || "");
                localStorage.setItem("auth_refresh_token", data.refreshToken || "");
                localStorage.setItem("auth_user_id", userId);
                const role = roleByUserId[userId] || "";
                if (role) {
                    localStorage.setItem("auth_role", role);
                }

                setNotice(successBox, "登录成功，正在进入工作台...");
                window.location.href = `${appOrigin}${appBasePath}/dashboard.html`;
            } catch (err) {
                setNotice(errorBox, "无法连接登录服务，请确认 auth 服务已启动");
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "登录";
            }
        });

        clearBtn.addEventListener("click", () => {
            localStorage.removeItem("auth_access_token");
            localStorage.removeItem("auth_refresh_token");
            localStorage.removeItem("auth_user_id");
            localStorage.removeItem("auth_role");
            setNotice(successBox, "已清除本地登录");
        });

        startBtn.addEventListener("click", openLoginModal);
        closeModalBtn.addEventListener("click", closeLoginModal);
        modalBackdrop.addEventListener("click", closeLoginModal);
        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && loginModal.classList.contains("is-open")) {
                closeLoginModal();
            }
        });

        function settleBubbles() {
            bubbleMotion.forEach((motion) => {
                motion.targetX = 0;
                motion.targetY = 0;
                motion.targetScaleX = 1;
                motion.targetScaleY = 1;
            });
        }

        function pushBubbles(pointerX, pointerY) {
            bubbleMotion.forEach((motion) => {
                const rect = motion.orb.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const deltaX = pointerX - centerX;
                const deltaY = pointerY - centerY;
                const distance = Math.hypot(deltaX, deltaY);
                const radius = Math.max(rect.width, rect.height) * 0.72;

                if (distance > radius) {
                    motion.targetX = 0;
                    motion.targetY = 0;
                    motion.targetScaleX = 1;
                    motion.targetScaleY = 1;
                    return;
                }

                const strength = (1 - distance / radius) ** 2;
                const angle = distance === 0 ? -Math.PI / 2 : Math.atan2(deltaY, deltaX);
                const push = 72 * strength;
                motion.targetX = -Math.cos(angle) * push;
                motion.targetY = -Math.sin(angle) * push;
                motion.targetScaleX = 1 + strength * 0.1;
                motion.targetScaleY = 1 - strength * 0.08;
            });
        }

        function animateBubbles() {
            const now = performance.now();
            bubbleMotion.forEach((motion) => {
                const idleX = Math.sin(now * motion.speed + motion.phase) * motion.driftX;
                const idleY = Math.cos(now * motion.speed * 0.82 + motion.phase * 1.2) * motion.driftY;
                const nextX = motion.targetX + idleX;
                const nextY = motion.targetY + idleY;

                motion.x += (nextX - motion.x) * 0.15;
                motion.y += (nextY - motion.y) * 0.15;
                motion.scaleX += (motion.targetScaleX - motion.scaleX) * 0.15;
                motion.scaleY += (motion.targetScaleY - motion.scaleY) * 0.15;

                motion.orb.style.setProperty("--push-x", `${motion.x.toFixed(2)}px`);
                motion.orb.style.setProperty("--push-y", `${motion.y.toFixed(2)}px`);
                motion.orb.style.setProperty("--bubble-scale-x", motion.scaleX.toFixed(3));
                motion.orb.style.setProperty("--bubble-scale-y", motion.scaleY.toFixed(3));
            });
            requestAnimationFrame(animateBubbles);
        }

        if (!prefersReducedMotion.matches) {
            window.addEventListener("pointermove", (event) => {
                pushBubbles(event.clientX, event.clientY);
            });
            window.addEventListener("pointerleave", settleBubbles);
            window.addEventListener("blur", settleBubbles);
            requestAnimationFrame(animateBubbles);
        }

        runTypewriter();
    </script>
</body>
