<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linksee 登录</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f3ee;
            --bg-deep: #efe7dd;
            --card: #ffffff;
            --ink: #1f1f1f;
            --muted: #6c6c6c;
            --accent: #0f766e;
            --accent-strong: #0b4f49;
            --accent-bright: #14b8a6;
            --accent-soft: rgba(15, 118, 110, 0.12);
            --accent-fog: rgba(20, 184, 166, 0.16);
            --border: rgba(31, 31, 31, 0.1);
            --shadow: 0 24px 60px rgba(17, 24, 39, 0.16);
            --shadow-soft: 0 12px 32px rgba(15, 23, 42, 0.12);
            --radius-lg: 24px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
            color: var(--ink);
            background: radial-gradient(1200px 600px at 10% -10%, #fdf7ef 0%, transparent 60%),
                radial-gradient(800px 400px at 95% 15%, #e4f4f1 0%, transparent 60%),
                linear-gradient(180deg, var(--bg), var(--bg-deep));
            min-height: 100vh;
        }

        .page {
            display: grid;
            grid-template-columns: minmax(240px, 1.1fr) minmax(320px, 1fr);
            gap: 48px;
            align-items: center;
            padding: 88px 8vw 64px;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            width: 100%;
        }

        .topbar {
            position: absolute;
            top: 28px;
            left: 8vw;
            right: 8vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: linear-gradient(140deg, var(--accent), var(--accent-bright));
            box-shadow: 0 10px 20px rgba(15, 118, 110, 0.35);
            position: relative;
        }

        .brand-mark::after {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            opacity: 0.9;
        }

        .pill-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .pill {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid rgba(15, 118, 110, 0.25);
            background: rgba(255, 255, 255, 0.6);
            color: var(--accent-strong);
            backdrop-filter: blur(10px);
        }

        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(0);
            opacity: 0.7;
            pointer-events: none;
            animation: float 10s ease-in-out infinite;
        }

        .orb--left {
            width: 570px;
            height: 570px;
            background: rgba(15, 118, 110, 0.16);
            top: 2%;
            left: -6%;
        }

        .orb--right {
            width: 480px;
            height: 480px;
            background: rgba(249, 115, 22, 0.1);
            bottom: 4%;
            right: -6%;
            animation-delay: 1.6s;
            opacity: 0.45;
        }

        .orb--top {
            width: 420px;
            height: 420px;
            background: rgba(56, 189, 248, 0.14);
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0.6s;
        }

        .orb--bottom {
            width: 540px;
            height: 540px;
            background: rgba(94, 234, 212, 0.14);
            bottom: -16%;
            left: -4%;
            animation-delay: 2.2s;
        }

        .orb--mid {
            width: 390px;
            height: 390px;
            background: rgba(16, 185, 129, 0.12);
            top: 46%;
            left: 28%;
            animation-delay: 1.2s;
        }

        .hero {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 560px;
            animation: reveal 0.8s ease-out;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-strong);
            font-weight: 600;
        }

        .eyebrow::before {
            content: "";
            width: 28px;
            height: 1px;
            background: var(--accent-strong);
        }

        h1 {
            font-size: clamp(32px, 4.2vw, 48px);
            line-height: 1.08;
            margin: 0;
            letter-spacing: -0.01em;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 10px;
        }

        .feature {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            font-size: 14px;
            color: var(--muted);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .stat {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(31, 31, 31, 0.08);
            box-shadow: var(--shadow-soft);
        }

        .stat strong {
            display: block;
            font-size: 20px;
            color: var(--ink);
        }

        .stat span {
            font-size: 12px;
            color: var(--muted);
        }

        .card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(31, 31, 31, 0.06);
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: reveal 0.9s ease-out;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .card-tag {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent-fog);
            color: var(--accent-strong);
            font-weight: 600;
        }

        .card h2 {
            margin: 0;
            font-size: 20px;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: var(--muted);
        }

        input {
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(31, 31, 31, 0.16);
            font: inherit;
            background: #fff;
            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: rgba(15, 118, 110, 0.4);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
        }

        .notice {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            display: none;
        }

        .notice.is-visible {
            display: block;
        }

        .notice--error {
            background: rgba(220, 38, 38, 0.08);
            color: #991b1b;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .notice--success {
            background: rgba(5, 150, 105, 0.1);
            color: #065f46;
            border: 1px solid rgba(5, 150, 105, 0.2);
        }

        button {
            border: none;
            font: inherit;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        button:focus-visible {
            outline: 3px solid rgba(15, 118, 110, 0.25);
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            box-shadow: 0 12px 24px rgba(15, 118, 110, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(15, 118, 110, 0.3);
        }

        .btn-ghost {
            background: var(--accent-soft);
            color: var(--accent-strong);
        }

        .legal {
            font-size: 12px;
            color: #8b8b8b;
        }

        .helper {
            font-size: 12px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .helper button {
            padding: 0;
            border: none;
            background: none;
            color: var(--accent-strong);
            cursor: pointer;
            font-size: 12px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(14px);
            }
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            .page {
                grid-template-columns: 1fr;
                padding: 56px 6vw;
            }

            .topbar {
                position: static;
                margin-bottom: 24px;
                padding-top: 4px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .stat-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap");
    </style>
</head>

<body>
    <main class="page">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true"></span>
                Linksee
            </div>
            <div class="pill-group">
                <span class="pill">Secure Login</span>
                <span class="pill">Auth Service</span>
                <span class="pill">MVP</span>
            </div>
        </header>
        <div class="orb orb--left"></div>
        <div class="orb orb--right"></div>
        <div class="orb orb--top"></div>
        <div class="orb orb--bottom"></div>
        <div class="orb orb--mid"></div>

        <section class="hero">
            <span class="eyebrow">Linksee Portal</span>
            <h1>进入课程协作与教学管理</h1>
            <p>
                使用一卡通号与密码验证身份，登录后进入工作台查看课程、分组与提交进度。
            </p>
            <div class="feature-grid">
                <div class="feature">账号安全校验与权限分离</div>
                <div class="feature">课程阶段与提交记录同步</div>
                <div class="feature">协作进度可追踪</div>
                <div class="feature">助教与教师权限明确</div>
            </div>
            <div class="stat-grid">
                <div class="stat">
                    <strong>10 位</strong>
                    <span>一卡通号登录</span>
                </div>
                <div class="stat">
                    <strong>30 分钟</strong>
                    <span>访问令牌有效期</span>
                </div>
                <div class="stat">
                    <strong>安全</strong>
                    <span>Argon2 密码散列</span>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>账号登录</h2>
                <span class="card-tag">正式入口</span>
            </div>
            <p>请输入 10 位一卡通号与密码进行登录。</p>
            <form id="loginForm" class="form">
                <div class="field">
                    <label for="userId">一卡通号</label>
                    <input id="userId" name="userId" inputmode="numeric" placeholder="请输入 10 位一卡通号"
                        autocomplete="username" />
                </div>
                <div class="field">
                    <label for="password">密码</label>
                    <input id="password" name="password" type="password" placeholder="请输入密码"
                        autocomplete="current-password" />
                </div>
                <div class="notice notice--error" id="errorBox"></div>
                <div class="notice notice--success" id="successBox"></div>
                <div class="actions">
                    <button class="btn-primary" id="loginBtn" type="submit">登录</button>
                    <button class="btn-ghost" id="clearBtn" type="button">清除本地登录</button>
                </div>
            </form>
            <div class="helper">
                <span>忘记密码？</span>
                <button type="button" id="contactAdmin">联系管理员</button>
            </div>
            <p class="legal">默认调用 http://localhost:3001 的登录接口。</p>
        </section>
    </main>
    <script>
        const runtimeOrigin =
            window.location.origin && window.location.origin !== "null"
                ? window.location.origin
                : "";
        const storedAuthOrigin = localStorage.getItem("auth_origin") || "";
        const appOrigin = runtimeOrigin || "http://localhost:3001";
        const authOrigin = storedAuthOrigin || "http://localhost:3001";
        const appBasePath = window.location.pathname.includes("/app/") ? "/app" : "";

        const loginForm = document.getElementById("loginForm");
        const userIdInput = document.getElementById("userId");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const clearBtn = document.getElementById("clearBtn");
        const errorBox = document.getElementById("errorBox");
        const successBox = document.getElementById("successBox");

        function setNotice(target, text) {
            if (!target) {
                return;
            }
            target.textContent = text || "";
            target.classList.toggle("is-visible", Boolean(text));
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const userId = userIdInput.value.trim();
            const password = passwordInput.value.trim();

            setNotice(errorBox, "");
            setNotice(successBox, "");

            if (!/^\d{10}$/.test(userId)) {
                setNotice(errorBox, "账号必须是 10 位数字的一卡通号");
                return;
            }

            if (!password) {
                setNotice(errorBox, "请输入密码");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "登录中...";

            try {
                const response = await fetch(`${authOrigin}/api/v1/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ userId, password }),
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok || !payload?.ok) {
                    setNotice(errorBox, payload?.message || "登录失败，请检查账号或密码");
                    return;
                }

                const data = payload.data || {};
                localStorage.setItem("auth_access_token", data.accessToken || "");
                localStorage.setItem("auth_refresh_token", data.refreshToken || "");
                localStorage.setItem("auth_user_id", userId);

                setNotice(successBox, "登录成功，正在进入工作台...");
                window.location.href = `${appOrigin}${appBasePath}/dashboard.html`;
            } catch (err) {
                setNotice(errorBox, "无法连接登录服务，请确认 auth 服务已启动");
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "登录";
            }
        });

        clearBtn.addEventListener("click", () => {
            localStorage.removeItem("auth_access_token");
            localStorage.removeItem("auth_refresh_token");
            localStorage.removeItem("auth_user_id");
            setNotice(successBox, "已清除本地登录");
        });
    </script>
</body>

</html>
